<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empire: Wargame of the Century</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #eee; font-family: monospace; overflow: hidden; }

#game-container { position: relative; width: 100vw; height: 100vh; }

canvas { display: block; }

/* HUD */
#hud-top {
  position: absolute; top: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.85); padding: 8px 16px;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 14px; z-index: 10; border-bottom: 1px solid #444;
}
#hud-bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.85); padding: 8px 16px;
  font-size: 14px; z-index: 10; border-top: 1px solid #444;
  display: flex; justify-content: space-between; align-items: center;
}
#end-turn-btn, .hud-btn {
  background: #c44; color: #fff; border: none; padding: 6px 16px;
  font-family: monospace; font-size: 14px; cursor: pointer;
}
#end-turn-btn:hover, .hud-btn:hover { background: #e66; }
.hud-btn { background: #555; margin-right: 6px; }
#hud-bottom-left { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }

/* Production Modal */
#modal-overlay {
  display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); z-index: 20;
  justify-content: center; align-items: center;
}
#modal-overlay.active { display: flex; }
#production-modal {
  background: #222; border: 2px solid #888; padding: 20px; min-width: 320px;
}
#production-modal h2 { margin-bottom: 12px; font-size: 16px; }
.prod-item {
  padding: 6px 10px; cursor: pointer; display: flex; justify-content: space-between;
  border-bottom: 1px solid #333;
}
.prod-item:hover { background: #444; }
.prod-item .cost { color: #aaa; }
#modal-close {
  margin-top: 12px; background: #555; color: #fff; border: none;
  padding: 4px 12px; cursor: pointer; font-family: monospace;
}

/* Win/Lose overlay */
#game-over-overlay {
  display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8); z-index: 30;
  justify-content: center; align-items: center;
  font-size: 32px; font-weight: bold;
}
#game-over-overlay.active { display: flex; }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="canvas"></canvas>

  <div id="hud-top">
    <span id="hud-turn">Turn: 1</span>
    <span id="hud-faction">Player</span>
    <span id="hud-instructions"></span>
  </div>

  <div id="hud-bottom">
    <div id="hud-bottom-left">
      <span id="hud-info">Select a unit or city</span>
      <button class="hud-btn" id="btn-skip">Skip</button>
      <button class="hud-btn" id="btn-next">Next</button>
    </div>
    <button id="end-turn-btn">End Turn</button>
  </div>

  <div id="modal-overlay">
    <div id="production-modal">
      <h2 id="modal-title">Set Production</h2>
      <div id="prod-list"></div>
      <button id="modal-close">Cancel</button>
    </div>
  </div>

  <div id="game-over-overlay">
    <span id="game-over-text"></span>
  </div>
</div>

<script>
// ============================================================
// 1. CONSTANTS & CONFIG
// ============================================================

const IS_TOUCH = 'ontouchstart' in window;
const TILE_SIZE = IS_TOUCH ? 36 : 20;
const MAP_W = 40;
const MAP_H = 40;
const OCEAN_RATIO = 0.60;
const NUM_CITIES = 16;
const SIGHT_RANGE = 2;

const TILE = { OCEAN: 0, LAND: 1, CITY: 2 };
const FACTION = { NONE: 0, PLAYER: 1, AI: 2 };
const DOMAIN = { LAND: 'land', SEA: 'sea', AIR: 'air' };
const FOG = { HIDDEN: 0, SEEN: 1, VISIBLE: 2 };

const UNIT_TYPES = {
  army:       { name: 'Army',       symbol: 'A', moves: 1,  domain: DOMAIN.LAND, combat: true,  capacity: 0, carries: null,       cost: 5  },
  fighter:    { name: 'Fighter',    symbol: 'F', moves: 8,  domain: DOMAIN.AIR,  combat: true,  capacity: 0, carries: null,       cost: 10 },
  bomber:     { name: 'Bomber',     symbol: 'B', moves: 6,  domain: DOMAIN.AIR,  combat: true,  capacity: 0, carries: null,       cost: 12 },
  transport:  { name: 'Transport',  symbol: 'T', moves: 5,  domain: DOMAIN.SEA,  combat: false, capacity: 6, carries: 'army',     cost: 15 },
  destroyer:  { name: 'Destroyer',  symbol: 'D', moves: 7,  domain: DOMAIN.SEA,  combat: true,  capacity: 0, carries: null,       cost: 10 },
  submarine:  { name: 'Submarine',  symbol: 'S', moves: 5,  domain: DOMAIN.SEA,  combat: true,  capacity: 0, carries: null,       cost: 12 },
  cruiser:    { name: 'Cruiser',    symbol: 'R', moves: 6,  domain: DOMAIN.SEA,  combat: true,  capacity: 0, carries: null,       cost: 18 },
  battleship: { name: 'Battleship', symbol: 'W', moves: 4,  domain: DOMAIN.SEA,  combat: true,  capacity: 0, carries: null,       cost: 25 },
  carrier:    { name: 'Carrier',    symbol: 'C', moves: 5,  domain: DOMAIN.SEA,  combat: false, capacity: 8, carries: 'air',      cost: 30 },
};

// Combat modifiers (attack, defense)
const COMBAT_STATS = {
  army: [1, 1], fighter: [2, 1], bomber: [3, 1],
  transport: [0, 1], destroyer: [2, 2], submarine: [3, 1],
  cruiser: [3, 3], battleship: [4, 4], carrier: [0, 2],
};

const FACTION_COLORS = {
  [FACTION.PLAYER]: '#4a4',
  [FACTION.AI]: '#e44',
  [FACTION.NONE]: '#aaa',
};

// ============================================================
// 2. GAME STATE
// ============================================================

let state = {
  map: [],           // 2D array [y][x] of tile types
  fog: [],           // 2D array [y][x] of fog states (player only)
  cities: [],        // { x, y, faction, production: null|string, turnsLeft: 0, name }
  units: [],         // { type, faction, x, y, movesLeft, id, cargo: [] }
  turn: 1,
  phase: 'player',   // 'player' | 'ai'
  currentUnitIndex: -1,
  nextUnitId: 1,
  cameraX: 0,
  cameraY: 0,
  selectedCity: null,
  gameOver: false,
};

// ============================================================
// 3. MAP GENERATION
// ============================================================

function generateMap() {
  // Create noise-based terrain
  const map = [];
  for (let y = 0; y < MAP_H; y++) {
    map[y] = [];
    for (let x = 0; x < MAP_W; x++) {
      map[y][x] = TILE.OCEAN;
    }
  }

  // Seed land blobs
  const numSeeds = 8 + Math.floor(Math.random() * 5);
  const landTarget = MAP_W * MAP_H * (1 - OCEAN_RATIO);
  let landCount = 0;

  for (let s = 0; s < numSeeds; s++) {
    let sx = 3 + Math.floor(Math.random() * (MAP_W - 6));
    let sy = 3 + Math.floor(Math.random() * (MAP_H - 6));
    const blobSize = 20 + Math.floor(Math.random() * 40);
    for (let i = 0; i < blobSize && landCount < landTarget; i++) {
      if (sx >= 0 && sx < MAP_W && sy >= 0 && sy < MAP_H && map[sy][sx] === TILE.OCEAN) {
        map[sy][sx] = TILE.LAND;
        landCount++;
      }
      const dir = Math.floor(Math.random() * 4);
      if (dir === 0) sx++;
      else if (dir === 1) sx--;
      else if (dir === 2) sy++;
      else sy--;
      sx = Math.max(0, Math.min(MAP_W - 1, sx));
      sy = Math.max(0, Math.min(MAP_H - 1, sy));
    }
  }

  // Fill more land if needed
  while (landCount < landTarget) {
    const x = Math.floor(Math.random() * MAP_W);
    const y = Math.floor(Math.random() * MAP_H);
    if (map[y][x] === TILE.OCEAN) {
      // Only place near existing land
      let nearLand = false;
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          const nx = x + dx, ny = y + dy;
          if (nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H && map[ny][nx] === TILE.LAND) {
            nearLand = true;
          }
        }
      }
      if (nearLand) {
        map[y][x] = TILE.LAND;
        landCount++;
      }
    }
  }

  state.map = map;

  // Initialize fog
  state.fog = [];
  for (let y = 0; y < MAP_H; y++) {
    state.fog[y] = [];
    for (let x = 0; x < MAP_W; x++) {
      state.fog[y][x] = FOG.HIDDEN;
    }
  }
}

const CITY_NAMES = [
  'Alpha','Bravo','Charlie','Delta','Echo','Foxtrot','Golf','Hotel',
  'India','Juliet','Kilo','Lima','Mike','November','Oscar','Papa',
  'Quebec','Romeo','Sierra','Tango','Uniform','Victor','Whiskey','Xray'
];

function placeCities() {
  state.cities = [];
  const landTiles = [];
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      if (state.map[y][x] === TILE.LAND) landTiles.push({ x, y });
    }
  }

  // Shuffle land tiles
  for (let i = landTiles.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [landTiles[i], landTiles[j]] = [landTiles[j], landTiles[i]];
  }

  // Place cities with minimum distance
  const placed = [];
  let nameIdx = 0;
  for (const tile of landTiles) {
    if (placed.length >= NUM_CITIES) break;
    const tooClose = placed.some(p =>
      Math.abs(p.x - tile.x) + Math.abs(p.y - tile.y) < 4
    );
    if (tooClose) continue;

    state.map[tile.y][tile.x] = TILE.CITY;
    placed.push(tile);

    let faction = FACTION.NONE;
    // First city goes to player, second to AI
    if (placed.length === 1) faction = FACTION.PLAYER;
    else if (placed.length === 2) faction = FACTION.AI;

    state.cities.push({
      x: tile.x, y: tile.y, faction,
      production: faction !== FACTION.NONE ? 'army' : null,
      turnsLeft: faction !== FACTION.NONE ? UNIT_TYPES.army.cost : 0,
      name: CITY_NAMES[nameIdx++] || ('City' + nameIdx++),
    });
  }

  // Spawn starting armies
  for (const city of state.cities) {
    if (city.faction === FACTION.PLAYER || city.faction === FACTION.AI) {
      spawnUnit('army', city.faction, city.x, city.y);
    }
  }
}

// ============================================================
// 4. UNIT MANAGEMENT
// ============================================================

function spawnUnit(type, faction, x, y) {
  state.units.push({
    type, faction, x, y,
    movesLeft: UNIT_TYPES[type].moves,
    id: state.nextUnitId++,
    cargo: [],
    moved: false,
  });
}

function getUnitsAt(x, y, faction) {
  return state.units.filter(u => u.x === x && u.y === y && (faction === undefined || u.faction === faction));
}

function removeUnit(unit) {
  const idx = state.units.indexOf(unit);
  if (idx !== -1) state.units.splice(idx, 1);
  // Release cargo
  if (unit.cargo && unit.cargo.length > 0) {
    for (const carried of unit.cargo) {
      removeUnit(carried);
    }
  }
}

// ============================================================
// 5. FOG OF WAR
// ============================================================

function updateFog() {
  // Dim all currently visible tiles
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      if (state.fog[y][x] === FOG.VISIBLE) {
        state.fog[y][x] = FOG.SEEN;
      }
    }
  }

  // Reveal around player units
  for (const unit of state.units) {
    if (unit.faction !== FACTION.PLAYER) continue;
    revealAround(unit.x, unit.y);
  }

  // Reveal around player cities
  for (const city of state.cities) {
    if (city.faction !== FACTION.PLAYER) continue;
    revealAround(city.x, city.y);
  }
}

function revealAround(cx, cy) {
  for (let dy = -SIGHT_RANGE; dy <= SIGHT_RANGE; dy++) {
    for (let dx = -SIGHT_RANGE; dx <= SIGHT_RANGE; dx++) {
      const nx = cx + dx, ny = cy + dy;
      if (nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H) {
        state.fog[ny][nx] = FOG.VISIBLE;
      }
    }
  }
}

// ============================================================
// 6. MOVEMENT & COMBAT
// ============================================================

function canMoveTo(unit, tx, ty) {
  if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return false;
  if (unit.movesLeft <= 0) return false;

  const tile = state.map[ty][tx];
  const info = UNIT_TYPES[unit.type];

  if (info.domain === DOMAIN.LAND) {
    // Armies can move on land and cities, or onto sea if a friendly transport is there
    if (tile === TILE.LAND || tile === TILE.CITY) return true;
    if (tile === TILE.OCEAN) {
      const transports = getUnitsAt(tx, ty, unit.faction).filter(
        u => u.type === 'transport' && u.cargo.length < UNIT_TYPES.transport.capacity
      );
      return transports.length > 0;
    }
    return false;
  }

  if (info.domain === DOMAIN.SEA) {
    return tile === TILE.OCEAN || tile === TILE.CITY;
  }

  if (info.domain === DOMAIN.AIR) {
    return true; // Air units can fly over anything
  }

  return false;
}

function moveUnit(unit, tx, ty) {
  const info = UNIT_TYPES[unit.type];

  // Check for enemies
  const enemies = getUnitsAt(tx, ty).filter(u => u.faction !== unit.faction);
  if (enemies.length > 0) {
    if (!info.combat) return false; // Non-combat units can't attack

    // Submarine visibility: non-destroyers can't attack subs
    const target = enemies[0];
    if (target.type === 'submarine' && unit.type !== 'destroyer') {
      // Can't see the sub, treat as normal move if otherwise valid
    } else {
      return resolveCombat(unit, target);
    }
  }

  // City capture
  const city = getCityAt(tx, ty);
  if (city && city.faction !== unit.faction && unit.type === 'army') {
    city.faction = unit.faction;
    city.production = null;
    city.turnsLeft = 0;
  }

  // Board transport
  if (info.domain === DOMAIN.LAND && state.map[ty][tx] === TILE.OCEAN) {
    const transport = getUnitsAt(tx, ty, unit.faction).find(
      u => u.type === 'transport' && u.cargo.length < UNIT_TYPES.transport.capacity
    );
    if (transport) {
      transport.cargo.push(unit);
      unit.x = tx; unit.y = ty;
      unit.movesLeft = 0;
      unit.moved = true;
      return true;
    }
    return false;
  }

  // Disembark from transport
  if (info.domain === DOMAIN.LAND) {
    for (const u of getUnitsAt(unit.x, unit.y, unit.faction)) {
      if (u.type === 'transport') {
        const idx = u.cargo.indexOf(unit);
        if (idx !== -1) {
          u.cargo.splice(idx, 1);
        }
      }
    }
  }

  unit.x = tx;
  unit.y = ty;
  unit.movesLeft--;
  unit.moved = true;
  return true;
}

function resolveCombat(attacker, defender) {
  const aStats = COMBAT_STATS[attacker.type];
  const dStats = COMBAT_STATS[defender.type];

  const aRoll = Math.floor(Math.random() * 6) + 1 + aStats[0];
  const dRoll = Math.floor(Math.random() * 6) + 1 + dStats[1];

  if (aRoll >= dRoll) {
    // Attacker wins
    removeUnit(defender);
    attacker.x = defender.x;
    attacker.y = defender.y;
    attacker.movesLeft--;
    attacker.moved = true;

    // Capture city if army
    const city = getCityAt(attacker.x, attacker.y);
    if (city && city.faction !== attacker.faction && attacker.type === 'army') {
      city.faction = attacker.faction;
      city.production = null;
      city.turnsLeft = 0;
    }
  } else {
    // Defender wins
    removeUnit(attacker);
  }

  return true;
}

function getCityAt(x, y) {
  return state.cities.find(c => c.x === x && c.y === y) || null;
}

// ============================================================
// 7. PRODUCTION
// ============================================================

function tickProduction(faction) {
  for (const city of state.cities) {
    if (city.faction !== faction) continue;
    if (!city.production) continue;

    city.turnsLeft--;
    if (city.turnsLeft <= 0) {
      // Spawn unit
      const info = UNIT_TYPES[city.production];
      let sx = city.x, sy = city.y;

      if (info.domain === DOMAIN.SEA) {
        // Find adjacent ocean tile
        const adj = getAdjacentTiles(city.x, city.y).filter(
          t => state.map[t.y][t.x] === TILE.OCEAN
        );
        if (adj.length > 0) {
          const spot = adj[Math.floor(Math.random() * adj.length)];
          sx = spot.x; sy = spot.y;
        } else {
          // No adjacent ocean — delay production
          city.turnsLeft = 1;
          continue;
        }
      }

      spawnUnit(city.production, city.faction, sx, sy);
      city.turnsLeft = UNIT_TYPES[city.production].cost;
    }
  }
}

function getAdjacentTiles(x, y) {
  const tiles = [];
  for (const [dx, dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
    const nx = x + dx, ny = y + dy;
    if (nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H) {
      tiles.push({ x: nx, y: ny });
    }
  }
  return tiles;
}

// ============================================================
// 8. AI
// ============================================================

function aiTurn() {
  // AI production: set random production on cities that have none
  for (const city of state.cities) {
    if (city.faction !== FACTION.AI) continue;
    if (!city.production) {
      const types = Object.keys(UNIT_TYPES);
      // Favor armies and combat ships
      const weights = ['army','army','army','destroyer','fighter','cruiser','battleship','submarine','bomber','transport'];
      city.production = weights[Math.floor(Math.random() * weights.length)];
      city.turnsLeft = UNIT_TYPES[city.production].cost;
    }
  }

  // Move AI units
  const aiUnits = state.units.filter(u => u.faction === FACTION.AI);
  for (const unit of aiUnits) {
    if (!state.units.includes(unit)) continue; // may have been destroyed
    const info = UNIT_TYPES[unit.type];
    let maxMoves = info.moves;

    while (unit.movesLeft > 0 && maxMoves-- > 0) {
      let target = null;

      if (unit.type === 'army') {
        // Move toward nearest non-AI city
        target = findNearestCity(unit.x, unit.y, c => c.faction !== FACTION.AI);
      } else if (info.domain === DOMAIN.SEA) {
        // Move toward nearest enemy unit on sea or coast
        const enemy = findNearestUnit(unit.x, unit.y, u => u.faction === FACTION.PLAYER);
        if (enemy) target = { x: enemy.x, y: enemy.y };
      } else if (info.domain === DOMAIN.AIR) {
        // Move toward nearest enemy, but must end at city
        const enemy = findNearestUnit(unit.x, unit.y, u => u.faction === FACTION.PLAYER);
        if (enemy) target = { x: enemy.x, y: enemy.y };
      }

      if (target) {
        const dx = Math.sign(target.x - unit.x);
        const dy = Math.sign(target.y - unit.y);

        // Try primary direction first, then alternatives
        const moves = [];
        if (dx !== 0 && dy !== 0) {
          moves.push({ x: unit.x + dx, y: unit.y + dy });
          moves.push({ x: unit.x + dx, y: unit.y });
          moves.push({ x: unit.x, y: unit.y + dy });
        } else if (dx !== 0) {
          moves.push({ x: unit.x + dx, y: unit.y });
          moves.push({ x: unit.x + dx, y: unit.y + 1 });
          moves.push({ x: unit.x + dx, y: unit.y - 1 });
        } else if (dy !== 0) {
          moves.push({ x: unit.x, y: unit.y + dy });
          moves.push({ x: unit.x + 1, y: unit.y + dy });
          moves.push({ x: unit.x - 1, y: unit.y + dy });
        }

        let moved = false;
        for (const m of moves) {
          if (canMoveTo(unit, m.x, m.y)) {
            moveUnit(unit, m.x, m.y);
            moved = true;
            break;
          }
        }

        if (!moved) {
          // Random valid move
          const adj = getAdjacentTiles(unit.x, unit.y).filter(
            t => canMoveTo(unit, t.x, t.y)
          );
          if (adj.length > 0) {
            const pick = adj[Math.floor(Math.random() * adj.length)];
            moveUnit(unit, pick.x, pick.y);
          } else {
            break;
          }
        }
      } else {
        // Random move
        const adj = getAdjacentTiles(unit.x, unit.y).filter(
          t => canMoveTo(unit, t.x, t.y)
        );
        if (adj.length > 0) {
          const pick = adj[Math.floor(Math.random() * adj.length)];
          moveUnit(unit, pick.x, pick.y);
        } else {
          break;
        }
      }
    }
  }

  // Air units must land at city — destroy those that didn't
  for (const unit of [...state.units]) {
    if (unit.faction !== FACTION.AI) continue;
    const info = UNIT_TYPES[unit.type];
    if (info.domain === DOMAIN.AIR) {
      const city = getCityAt(unit.x, unit.y);
      const carrier = getUnitsAt(unit.x, unit.y, FACTION.AI).find(u => u.type === 'carrier');
      if (!city && !carrier) {
        // Try to return to nearest city
        // If can't, unit is lost
        removeUnit(unit);
      }
    }
  }

  tickProduction(FACTION.AI);
}

function findNearestCity(fx, fy, filter) {
  let best = null, bestDist = Infinity;
  for (const city of state.cities) {
    if (!filter(city)) continue;
    const dist = Math.abs(city.x - fx) + Math.abs(city.y - fy);
    if (dist < bestDist) { bestDist = dist; best = city; }
  }
  return best;
}

function findNearestUnit(fx, fy, filter) {
  let best = null, bestDist = Infinity;
  for (const unit of state.units) {
    if (!filter(unit)) continue;
    const dist = Math.abs(unit.x - fx) + Math.abs(unit.y - fy);
    if (dist < bestDist) { bestDist = dist; best = unit; }
  }
  return best;
}

// ============================================================
// 9. TURN MANAGEMENT
// ============================================================

function startPlayerTurn() {
  state.phase = 'player';
  state.turn++;

  // Reset unit moves
  for (const unit of state.units) {
    if (unit.faction === FACTION.PLAYER) {
      unit.movesLeft = UNIT_TYPES[unit.type].moves;
      unit.moved = false;
    }
  }

  tickProduction(FACTION.PLAYER);
  updateFog();

  // Air units that aren't on a city or carrier are destroyed
  for (const unit of [...state.units]) {
    if (unit.faction !== FACTION.PLAYER) continue;
    const info = UNIT_TYPES[unit.type];
    if (info.domain === DOMAIN.AIR) {
      const city = getCityAt(unit.x, unit.y);
      const carrier = getUnitsAt(unit.x, unit.y, FACTION.PLAYER).find(u => u.type === 'carrier');
      if (!city && !carrier) {
        removeUnit(unit);
      }
    }
  }

  selectNextUnit();
  render();
}

function selectNextUnit() {
  const playerUnits = state.units.filter(u => u.faction === FACTION.PLAYER && u.movesLeft > 0 && !u.moved);
  if (playerUnits.length > 0) {
    const unit = playerUnits[0];
    state.currentUnitIndex = state.units.indexOf(unit);
    centerCamera(unit.x, unit.y);
  } else {
    state.currentUnitIndex = -1;
  }
}

function getCurrentUnit() {
  if (state.currentUnitIndex >= 0 && state.currentUnitIndex < state.units.length) {
    const u = state.units[state.currentUnitIndex];
    if (u.faction === FACTION.PLAYER) return u;
  }
  return null;
}

function endPlayerTurn() {
  state.currentUnitIndex = -1;
  state.selectedCity = null;
  state.phase = 'ai';
  render();

  // Small delay for visual feedback
  setTimeout(() => {
    // Reset AI unit moves
    for (const unit of state.units) {
      if (unit.faction === FACTION.AI) {
        unit.movesLeft = UNIT_TYPES[unit.type].moves;
        unit.moved = false;
      }
    }
    aiTurn();
    checkWinCondition();
    if (!state.gameOver) {
      startPlayerTurn();
    }
  }, 200);
}

function checkWinCondition() {
  const playerCities = state.cities.filter(c => c.faction === FACTION.PLAYER).length;
  const aiCities = state.cities.filter(c => c.faction === FACTION.AI).length;
  const playerUnits = state.units.filter(u => u.faction === FACTION.PLAYER).length;
  const aiUnits = state.units.filter(u => u.faction === FACTION.AI).length;

  if (playerCities === state.cities.length) {
    showGameOver('VICTORY! You captured all cities!');
  } else if (playerCities === 0 && playerUnits === 0) {
    showGameOver('DEFEAT. You have been eliminated.');
  } else if (aiCities === 0 && aiUnits === 0) {
    showGameOver('VICTORY! The enemy has been eliminated!');
  }
}

function showGameOver(text) {
  state.gameOver = true;
  document.getElementById('game-over-text').textContent = text;
  document.getElementById('game-over-overlay').classList.add('active');
}

// ============================================================
// 10. RENDERING
// ============================================================

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  render();
}

function centerCamera(x, y) {
  state.cameraX = x * TILE_SIZE - canvas.width / 2 + TILE_SIZE / 2;
  state.cameraY = y * TILE_SIZE - canvas.height / 2 + TILE_SIZE / 2;
  clampCamera();
}

function clampCamera() {
  const maxX = MAP_W * TILE_SIZE - canvas.width;
  const maxY = MAP_H * TILE_SIZE - canvas.height;
  state.cameraX = Math.max(0, Math.min(maxX, state.cameraX));
  state.cameraY = Math.max(0, Math.min(maxY, state.cameraY));
}

function render() {
  if (!ctx) return;
  if (state.map.length === 0) return;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const startTileX = Math.floor(state.cameraX / TILE_SIZE);
  const startTileY = Math.floor(state.cameraY / TILE_SIZE);
  const endTileX = Math.min(MAP_W, startTileX + Math.ceil(canvas.width / TILE_SIZE) + 1);
  const endTileY = Math.min(MAP_H, startTileY + Math.ceil(canvas.height / TILE_SIZE) + 1);

  // Draw tiles
  for (let y = startTileY; y < endTileY; y++) {
    for (let x = startTileX; x < endTileX; x++) {
      if (y < 0 || x < 0) continue;
      const fog = state.fog[y][x];
      if (fog === FOG.HIDDEN) continue;

      const px = x * TILE_SIZE - state.cameraX;
      const py = y * TILE_SIZE - state.cameraY;
      const tile = state.map[y][x];

      // Tile color
      if (tile === TILE.OCEAN) {
        ctx.fillStyle = fog === FOG.VISIBLE ? '#1a3a5c' : '#0d1d2e';
      } else if (tile === TILE.LAND) {
        ctx.fillStyle = fog === FOG.VISIBLE ? '#2a5a2a' : '#152d15';
      } else if (tile === TILE.CITY) {
        const city = getCityAt(x, y);
        if (city) {
          const base = FACTION_COLORS[city.faction];
          if (fog === FOG.VISIBLE) {
            ctx.fillStyle = base;
          } else {
            ctx.fillStyle = dimColor(base);
          }
        }
      }
      ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);

      // Grid lines
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.strokeRect(px, py, TILE_SIZE, TILE_SIZE);

      // City marker
      if (tile === TILE.CITY && fog !== FOG.HIDDEN) {
        ctx.fillStyle = '#fff';
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('★', px + TILE_SIZE / 2, py + TILE_SIZE / 2);
      }
    }
  }

  // Draw units (only visible ones)
  for (const unit of state.units) {
    if (state.fog[unit.y][unit.x] !== FOG.VISIBLE) {
      // Submarine is hidden from player unless destroyer is nearby
      if (unit.faction === FACTION.AI && unit.type === 'submarine') continue;
      if (unit.faction === FACTION.AI) continue;
    }

    // Hide enemy submarines unless player destroyer is adjacent
    if (unit.faction === FACTION.AI && unit.type === 'submarine') {
      const playerDestroyers = state.units.filter(
        u => u.faction === FACTION.PLAYER && u.type === 'destroyer' &&
        Math.abs(u.x - unit.x) <= 1 && Math.abs(u.y - unit.y) <= 1
      );
      if (playerDestroyers.length === 0) continue;
    }

    const px = unit.x * TILE_SIZE - state.cameraX;
    const py = unit.y * TILE_SIZE - state.cameraY;
    const info = UNIT_TYPES[unit.type];

    ctx.fillStyle = FACTION_COLORS[unit.faction];
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(info.symbol, px + TILE_SIZE / 2, py + TILE_SIZE / 2);
  }

  // Highlight current unit
  const currentUnit = getCurrentUnit();
  if (currentUnit) {
    const px = currentUnit.x * TILE_SIZE - state.cameraX;
    const py = currentUnit.y * TILE_SIZE - state.cameraY;
    ctx.strokeStyle = '#ff0';
    ctx.lineWidth = 2;
    ctx.strokeRect(px, py, TILE_SIZE, TILE_SIZE);
    ctx.lineWidth = 1;
  }

  // Highlight selected city
  if (state.selectedCity) {
    const px = state.selectedCity.x * TILE_SIZE - state.cameraX;
    const py = state.selectedCity.y * TILE_SIZE - state.cameraY;
    ctx.strokeStyle = '#0ff';
    ctx.lineWidth = 2;
    ctx.strokeRect(px, py, TILE_SIZE, TILE_SIZE);
    ctx.lineWidth = 1;
  }

  updateHUD();
}

function dimColor(hex) {
  // Darken a hex color
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgb(${Math.floor(r * 0.4)},${Math.floor(g * 0.4)},${Math.floor(b * 0.4)})`;
}

function updateHUD() {
  document.getElementById('hud-turn').textContent = `Turn: ${state.turn}`;
  document.getElementById('hud-faction').textContent = state.phase === 'player' ? 'Your Turn' : 'AI Turn';

  const currentUnit = getCurrentUnit();
  let info = '';

  if (currentUnit) {
    const unitInfo = UNIT_TYPES[currentUnit.type];
    info = `${unitInfo.name} | Moves: ${currentUnit.movesLeft}/${unitInfo.moves}`;
    if (currentUnit.type === 'transport') {
      info += ` | Cargo: ${currentUnit.cargo.length}/${unitInfo.capacity}`;
    }
  }

  if (state.selectedCity) {
    const c = state.selectedCity;
    info += (info ? '  |  ' : '') + `City: ${c.name}`;
    if (c.production) {
      info += ` | Building: ${UNIT_TYPES[c.production].name} (${c.turnsLeft} turns)`;
    } else {
      info += ' | No production set';
    }
  }

  if (!info) info = 'Select a unit or city';
  document.getElementById('hud-info').textContent = info;

  // Instructions
  const instrEl = document.getElementById('hud-instructions');
  if (currentUnit) {
    instrEl.textContent = 'Arrow keys: move | Space: skip | Tab: next unit | Click city: production';
  } else {
    instrEl.textContent = 'Click a city to set production, or End Turn';
  }
}

// ============================================================
// 11. INPUT HANDLING
// ============================================================

let dragging = false;
let dragStartX = 0, dragStartY = 0;
let camStartX = 0, camStartY = 0;

document.addEventListener('keydown', (e) => {
  if (state.gameOver) return;
  if (state.phase !== 'player') return;
  if (document.getElementById('modal-overlay').classList.contains('active')) return;

  const unit = getCurrentUnit();

  switch (e.key) {
    case 'ArrowUp':
    case 'w':
      e.preventDefault();
      if (unit && canMoveTo(unit, unit.x, unit.y - 1)) {
        moveUnit(unit, unit.x, unit.y - 1);
        afterMove(unit);
      }
      break;
    case 'ArrowDown':
    case 's':
      e.preventDefault();
      if (unit && canMoveTo(unit, unit.x, unit.y + 1)) {
        moveUnit(unit, unit.x, unit.y + 1);
        afterMove(unit);
      }
      break;
    case 'ArrowLeft':
    case 'a':
      e.preventDefault();
      if (unit && canMoveTo(unit, unit.x - 1, unit.y)) {
        moveUnit(unit, unit.x - 1, unit.y);
        afterMove(unit);
      }
      break;
    case 'ArrowRight':
    case 'd':
      e.preventDefault();
      if (unit && canMoveTo(unit, unit.x + 1, unit.y)) {
        moveUnit(unit, unit.x + 1, unit.y);
        afterMove(unit);
      }
      break;
    case ' ':
      e.preventDefault();
      if (unit) {
        unit.movesLeft = 0;
        unit.moved = true;
        selectNextUnit();
        updateFog();
        render();
      }
      break;
    case 'Tab':
      e.preventDefault();
      if (unit) {
        unit.moved = true; // mark as handled for now
        selectNextUnit();
        render();
      }
      break;
  }
});

function afterMove(unit) {
  updateFog();
  checkWinCondition();
  if (state.gameOver) { render(); return; }

  if (unit.movesLeft <= 0 || !state.units.includes(unit)) {
    selectNextUnit();
  } else {
    centerCamera(unit.x, unit.y);
  }
  render();
}

canvas.addEventListener('mousedown', (e) => {
  dragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  camStartX = state.cameraX;
  camStartY = state.cameraY;
});

canvas.addEventListener('mousemove', (e) => {
  if (dragging) {
    state.cameraX = camStartX - (e.clientX - dragStartX);
    state.cameraY = camStartY - (e.clientY - dragStartY);
    clampCamera();
    render();
  }
});

canvas.addEventListener('mouseup', (e) => {
  const dx = Math.abs(e.clientX - dragStartX);
  const dy = Math.abs(e.clientY - dragStartY);

  if (dx < 5 && dy < 5) {
    handleClick(e);
  }
  dragging = false;
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  dragging = true;
  dragStartX = t.clientX;
  dragStartY = t.clientY;
  camStartX = state.cameraX;
  camStartY = state.cameraY;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (dragging) {
    const t = e.touches[0];
    state.cameraX = camStartX - (t.clientX - dragStartX);
    state.cameraY = camStartY - (t.clientY - dragStartY);
    clampCamera();
    render();
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const dx = Math.abs(t.clientX - dragStartX);
  const dy = Math.abs(t.clientY - dragStartY);

  if (dx < 10 && dy < 10) {
    handleClick({ clientX: t.clientX, clientY: t.clientY });
  }
  dragging = false;
}, { passive: false });

function handleClick(e) {
  if (state.gameOver) return;
  if (state.phase !== 'player') return;

  const tileX = Math.floor((e.clientX + state.cameraX) / TILE_SIZE);
  const tileY = Math.floor((e.clientY + state.cameraY) / TILE_SIZE);

  if (tileX < 0 || tileX >= MAP_W || tileY < 0 || tileY >= MAP_H) return;

  const city = getCityAt(tileX, tileY);

  // Move current unit toward tapped tile (takes priority over city modal)
  const unit = getCurrentUnit();
  if (unit) {
    const dx = tileX - unit.x;
    const dy = tileY - unit.y;

    if (Math.abs(dx) + Math.abs(dy) === 1) {
      // Adjacent tile — move directly
      if (canMoveTo(unit, tileX, tileY)) {
        moveUnit(unit, tileX, tileY);
        afterMove(unit);
        return;
      }
    } else if (dx !== 0 || dy !== 0) {
      // Non-adjacent — step one tile toward target
      const stepX = Math.sign(dx);
      const stepY = Math.sign(dy);
      const moves = [];
      if (stepX !== 0 && stepY !== 0) {
        moves.push({ x: unit.x + stepX, y: unit.y + stepY });
        moves.push({ x: unit.x + stepX, y: unit.y });
        moves.push({ x: unit.x, y: unit.y + stepY });
      } else if (stepX !== 0) {
        moves.push({ x: unit.x + stepX, y: unit.y });
      } else {
        moves.push({ x: unit.x, y: unit.y + stepY });
      }
      for (const m of moves) {
        if (canMoveTo(unit, m.x, m.y)) {
          moveUnit(unit, m.x, m.y);
          afterMove(unit);
          return;
        }
      }
    }
  }

  // Open production modal if tapping a friendly city with no unit to move
  if (city && city.faction === FACTION.PLAYER) {
    state.selectedCity = city;
    openProductionModal(city);
    render();
    return;
  }

  state.selectedCity = city;
  render();
}

// End Turn button
document.getElementById('end-turn-btn').addEventListener('click', () => {
  if (state.phase === 'player' && !state.gameOver) {
    endPlayerTurn();
  }
});

// Skip button — skip current unit (no more moves this turn)
document.getElementById('btn-skip').addEventListener('click', () => {
  const unit = getCurrentUnit();
  if (unit) {
    unit.movesLeft = 0;
    unit.moved = true;
    selectNextUnit();
    updateFog();
    render();
  }
});

// Next button — move to next unit (come back to this one later)
document.getElementById('btn-next').addEventListener('click', () => {
  const unit = getCurrentUnit();
  if (unit) {
    unit.moved = true;
    selectNextUnit();
    render();
  }
});

// ============================================================
// 12. PRODUCTION MODAL
// ============================================================

function openProductionModal(city) {
  const overlay = document.getElementById('modal-overlay');
  const list = document.getElementById('prod-list');
  document.getElementById('modal-title').textContent = `${city.name} — Set Production`;

  list.innerHTML = '';

  // Determine which units this city can build based on adjacent terrain
  const hasAdjacentOcean = getAdjacentTiles(city.x, city.y).some(
    t => state.map[t.y][t.x] === TILE.OCEAN
  );

  for (const [key, info] of Object.entries(UNIT_TYPES)) {
    if (info.domain === DOMAIN.SEA && !hasAdjacentOcean) continue;

    const item = document.createElement('div');
    item.className = 'prod-item';

    const highlight = city.production === key ? ' ← current' : '';
    item.innerHTML = `<span>${info.symbol} ${info.name}${highlight}</span><span class="cost">${info.cost} turns</span>`;

    item.addEventListener('click', () => {
      city.production = key;
      city.turnsLeft = info.cost;
      closeProductionModal();
      render();
    });

    list.appendChild(item);
  }

  overlay.classList.add('active');
}

function closeProductionModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

document.getElementById('modal-close').addEventListener('click', closeProductionModal);
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-overlay')) {
    closeProductionModal();
  }
});

// ============================================================
// 13. INITIALIZATION
// ============================================================

function init() {
  resizeCanvas();
  generateMap();
  placeCities();

  // Center camera on player's first city
  const playerCity = state.cities.find(c => c.faction === FACTION.PLAYER);
  if (playerCity) {
    centerCamera(playerCity.x, playerCity.y);
  }

  // Initial fog reveal
  updateFog();

  // Start first turn (don't increment turn counter)
  state.turn = 0;
  state.phase = 'player';

  // Reset player unit moves
  for (const unit of state.units) {
    if (unit.faction === FACTION.PLAYER) {
      unit.movesLeft = UNIT_TYPES[unit.type].moves;
      unit.moved = false;
    }
  }

  selectNextUnit();
  state.turn = 1;
  render();
}

window.addEventListener('resize', resizeCanvas);
init();
</script>
